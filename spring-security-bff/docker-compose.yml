services:
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    expose:
      - "9091"
    volumes:
      - ./infra/authelia/configuration.yml:/config/configuration.yml:ro
      - ./infra/authelia/users_database.yml:/config/users_database.yml:ro
      - ./infra/authelia/secrets:/config/secrets:ro
      - ./infra/authelia/data:/data

  https-proxy:
    image: nginx:1.29-alpine
    container_name: bff-local-https-proxy
    restart: unless-stopped
    depends_on:
      - authelia
    ports:
      - "8080:8080"
      - "9091:9091"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/https:/etc/nginx/certs:ro