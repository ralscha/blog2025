version: '3'

vars:
  MVNW: '{{if eq OS "windows"}}cmd /c mvnw.cmd{{else}}./mvnw{{end}}'

tasks:
  default:
    desc: "List all available tasks"
    cmds:
      - task --list-all

  clean:
    desc: "Clean the project"
    cmds:
      - '{{.MVNW}} clean'

  format:
    desc: "Format Java sources and sort pom.xml"
    cmds:
      - '{{.MVNW}} formatter:format sortpom:sort'

  package:
    desc: "Build the project"
    cmds:
      - '{{.MVNW}} clean package'

  run:
    desc: "Run the project with exec maven plugin"
    cmds:
      - '{{.MVNW}} exec:java' 

  verify:
    desc: "Build the project"
    cmds:
      - '{{.MVNW}} clean verify'      