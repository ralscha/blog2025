services:
  postgis:
    image: postgis/postgis:18-3.6-alpine
    container_name: starbucks-postgis
    environment:
      POSTGRES_DB: starbucks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d starbucks"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgis-data:/var/lib/postgresql

volumes:
  postgis-data: