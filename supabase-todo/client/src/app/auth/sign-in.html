<div class="h-screen flex flex-col bg-base-100 px-6">
  <div class="flex flex-col items-center justify-center pt-16 pb-8">
    <div class="flex items-center gap-3 mb-3">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 32 32"
        class="w-10 h-10"
        aria-hidden="true"
      >
        <rect width="32" height="32" rx="8" fill="#570df8" />
        <polyline
          points="7,17 13,23 25,10"
          fill="none"
          stroke="white"
          stroke-width="3.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <h1 class="text-3xl font-bold text-primary">SupaTodo</h1>
    </div>
    <p class="text-base-content/60 text-base font-semibold">Sign in to your account</p>
  </div>

  <div class="flex-1 flex flex-col justify-center max-w-sm w-full mx-auto gap-5">
    @if (errorMessage()) {
      <div role="alert" class="alert alert-error alert-soft">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5 shrink-0"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <fieldset class="fieldset">
        <legend class="fieldset-legend">Email</legend>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          class="input w-full"
          [class.input-error]="submitted() && form.controls.email.invalid"
          autocomplete="email"
        />
        @if (submitted() && form.controls.email.invalid) {
          <p class="label text-error text-xs">Valid email is required</p>
        }
      </fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Password</legend>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="input w-full"
          [class.input-error]="submitted() && form.controls.password.invalid"
          autocomplete="current-password"
        />
        @if (submitted() && form.controls.password.invalid) {
          <p class="label text-error text-xs">Password is required</p>
        }
      </fieldset>

      <button type="submit" class="btn btn-primary w-full mt-2" [disabled]="loading()">
        @if (loading()) {
          <span class="loading loading-spinner loading-sm"></span>
          Signing in…
        } @else {
          Sign In
        }
      </button>
    </form>
  </div>

  <div class="py-8 text-center text-sm text-base-content/50">
    Don't have an account?
    <a routerLink="/sign-up" class="link link-primary font-medium">Create an account</a>
  </div>
</div>
