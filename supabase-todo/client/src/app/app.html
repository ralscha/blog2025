<div [class.drawer]="isAuthenticated()">
  @if (isAuthenticated()) {
    <input id="app-drawer" type="checkbox" class="drawer-toggle" />
  }

  <div [class.drawer-content]="isAuthenticated()">
    <router-outlet />

    @if (isAuthenticated() && showHamburger()) {
      <label
        for="app-drawer"
        class="btn btn-ghost btn-circle fixed top-3 left-3 z-30"
        aria-label="Open menu"
        aria-haspopup="true"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-6 h-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </label>
    }
  </div>

  @if (isAuthenticated()) {
    <div class="drawer-side z-40">
      <label for="app-drawer" aria-label="Close menu" class="drawer-overlay"></label>
      <nav class="flex flex-col bg-base-200 min-h-full w-72 p-6 gap-1" aria-label="Main navigation">
        <p class="text-xs font-semibold uppercase tracking-widest text-base-content/40 px-3 mb-3">
          Navigation
        </p>

        <a
          routerLink="/todos"
          routerLinkActive="bg-primary text-primary-content"
          class="flex items-center gap-3 px-3 py-3 rounded-xl font-medium hover:bg-base-300 transition-colors"
          aria-label="Todos"
          (click)="closeDrawer()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"
            />
          </svg>
          Todos
        </a>

        <a
          routerLink="/profile"
          routerLinkActive="bg-primary text-primary-content"
          class="flex items-center gap-3 px-3 py-3 rounded-xl font-medium hover:bg-base-300 transition-colors"
          aria-label="Profile"
          (click)="closeDrawer()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
          Profile
        </a>

        <div class="divider my-2"></div>

        <button
          (click)="signOut()"
          class="flex items-center gap-3 px-3 py-3 rounded-xl font-medium hover:bg-error/10 hover:text-error transition-colors text-left"
          aria-label="Sign out"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          Sign Out
        </button>
      </nav>
    </div>
  }
</div>
