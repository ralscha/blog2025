<div class="flex flex-col items-center gap-4">
  @if (uploadError()) {
    <div role="alert" class="alert alert-error alert-soft alert-sm">
      <span>{{ uploadError() }}</span>
    </div>
  }

  <div class="avatar">
    <div
      class="w-28 h-28 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2 overflow-hidden bg-neutral flex items-center justify-center"
    >
      @if (avatarSrc()) {
        <img [src]="avatarSrc()!" alt="Profile photo" class="w-full h-full object-cover" />
      } @else {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-14 h-14 text-neutral-content"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"
            d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"
          />
        </svg>
      }
    </div>
  </div>

  <label
    class="btn btn-sm btn-outline cursor-pointer"
    [class.btn-disabled]="uploading()"
    tabindex="0"
    role="button"
    [attr.aria-disabled]="uploading()"
  >
    @if (uploading()) {
      <span class="loading loading-spinner loading-xs"></span>
      Uploading…
    } @else {
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-4 h-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"
        />
      </svg>
      Upload Photo
    }
    <input
      type="file"
      class="hidden"
      accept="image/*"
      (change)="uploadAvatar($event)"
      [disabled]="uploading()"
    />
  </label>
</div>
