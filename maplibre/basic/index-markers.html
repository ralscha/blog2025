<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Map with Markers</title>
  <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet"/>
  <link href="markers.css" rel="stylesheet"/>
  <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
</head>
<body>
<h1>Top 5 Swiss Mountains</h1>

<div id="map"></div>

<script>
  const mountains = [
    {
      name: "Dufourspitze (Monte Rosa)",
      coordinates: [7.8669, 45.9367],
      elevation: 4634,
      range: "Pennine Alps",
      firstAscent: "1855",
      description: "The highest peak in Switzerland, part of the Monte Rosa massif on the border with Italy."
    },
    {
      name: "Dom",
      coordinates: [7.8588, 46.0938],
      elevation: 4545,
      range: "Pennine Alps",
      firstAscent: "1858",
      description: "The highest mountain lying entirely within Switzerland, located in the Mischabel group."
    },
    {
      name: "Liskamm",
      coordinates: [7.8356, 45.9225],
      elevation: 4527,
      range: "Pennine Alps",
      firstAscent: "1861",
      description: "A distinctive mountain with a sharp east-west oriented ridge, nicknamed 'the Man-eater'."
    },
    {
      name: "Weisshorn",
      coordinates: [7.7165, 46.1058],
      elevation: 4506,
      range: "Pennine Alps",
      firstAscent: "1861",
      description: "One of the most beautiful peaks in the Alps, with a distinctive pyramidal shape."
    },
    {
      name: "Matterhorn",
      coordinates: [7.6586, 45.9764],
      elevation: 4478,
      range: "Pennine Alps",
      firstAscent: "1865",
      description: "The most famous mountain in Switzerland, known for its distinctive pyramid shape."
    }
  ];

  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://vectortiles.geo.admin.ch/styles/ch.swisstopo.basemap.vt/style.json',
    center: [7.8, 46.0],
    zoom: 8,
  });

  map.addControl(new maplibregl.NavigationControl());

  map.addControl(new maplibregl.ScaleControl({
    maxWidth: 100,
    unit: 'metric'
  }));

  map.on('load', () => {
    mountains.forEach((mountain) => {
      const markerElement = document.createElement('div');
      markerElement.className = 'mountain-marker';
      markerElement.title = mountain.name;

      const popupContent = `
                    <div class="popup-title">${mountain.name}</div>
                    <div class="popup-info">
                        <strong>Elevation:</strong> ${mountain.elevation.toLocaleString()} m<br>
                        <strong>Mountain Range:</strong> ${mountain.range}<br>
                        <strong>First Ascent:</strong> ${mountain.firstAscent}<br><br>
                        ${mountain.description}
                    </div>
                `;

      const popup = new maplibregl.Popup({
        offset: 25,
        closeButton: true,
        closeOnClick: false
      }).setHTML(popupContent);

      new maplibregl.Marker({
        element: markerElement,
        anchor: 'center'
      })
        .setLngLat(mountain.coordinates)
        .setPopup(popup)
        .addTo(map);
    });

    const bounds = new maplibregl.LngLatBounds();
    mountains.forEach(mountain => {
      bounds.extend(mountain.coordinates);
    });

    map.fitBounds(bounds, {
      padding: 50,
      maxZoom: 10
    });
  });
</script>
</body>
</html>
