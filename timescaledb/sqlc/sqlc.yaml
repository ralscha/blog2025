version: "2"
sql:
  - engine: postgresql
    schema:
      - ../db/schema
    queries:
      - ../db/queries
    gen:
      go:
        package: sqlc
        out: ../internal/store/sqlc
        sql_package: pgx/v5
        emit_interface: false
        emit_json_tags: false
        emit_pointers_for_null_types: true
